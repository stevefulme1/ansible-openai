---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff ansible-core ansible-lint
      - name: Ruff check
        run: ruff check --ignore E402,UP001,UP010,I001 .
      - name: Ruff format check
        run: ruff format --check .
      - name: Ansible-lint
        run: ansible-lint

  sanity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ansible-version: "2.16"
            python: "3.12"
          - ansible-version: "2.17"
            python: "3.12"
          - ansible-version: "2.18"
            python: "3.12"
          - ansible-version: "2.18"
            python: "3.13"
          - ansible-version: "2.20"
            python: "3.12"
          - ansible-version: "2.20"
            python: "3.13"
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/openai
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install ansible-core ${{ matrix.ansible-version }}
        run: pip install "ansible-core~=${{ matrix.ansible-version }}.0"
      - name: Run sanity tests
        run: ansible-test sanity --python ${{ matrix.python }} -v --color yes --skip-test validate-modules --skip-test pep8 --exclude extensions/
        working-directory: ansible_collections/stevefulme1/openai

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/openai
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          pip install "ansible-core>=2.16"
          pip install pytest
      - name: Run unit tests
        working-directory: ansible_collections/stevefulme1/openai
        run: python -m pytest tests/unit/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  integration-mock:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/openai
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install "ansible-core>=2.16"
      - name: Run integration tests (mock)
        run: ansible-test integration --python 3.12 -v --color yes 2>&1 || true
        working-directory: ansible_collections/stevefulme1/openai

  auto-merge:
    if: github.event_name == 'pull_request' && github.actor == 'stevefulme1'
    needs: [lint, sanity, unit]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: hmarr/auto-approve-action@v4
      - name: Auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
