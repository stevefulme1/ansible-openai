---
# OpenAI connection
openai_api_key: "{{ lookup('env', 'OPENAI_API_KEY') }}"
openai_organization: "{{ lookup('env', 'OPENAI_ORG_ID') | default('', true) }}"

# API key management
gov_rotate_keys: false
gov_key_name_prefix: "ansible-managed"
gov_deactivate_old_keys: true
gov_key_max_age_days: 90

# Project management
gov_projects: []
#   - name: "production"
#     rate_limit_tokens_per_minute: 100000
#     rate_limit_requests_per_minute: 500
#   - name: "development"
#     rate_limit_tokens_per_minute: 10000
#     rate_limit_requests_per_minute: 100

# Usage monitoring
gov_usage_check_enabled: true
gov_usage_alert_threshold_usd: 1000.00
gov_usage_period_days: 30

# Model access
gov_allowed_models: []
#   - "gpt-4o"
#   - "gpt-4o-mini"
#   - "text-embedding-3-small"

# Content filtering
gov_content_filter_enabled: true

# Audit
gov_audit_log_enabled: true
gov_audit_log_path: "/var/log/openai-governance"

gov_state: present
