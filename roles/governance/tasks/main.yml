---
- name: Validate OpenAI connection
  ansible.builtin.assert:
    that:
      - openai_api_key is defined and openai_api_key | length > 0
    fail_msg: "Required: openai_api_key (OPENAI_API_KEY)"

- name: Apply OpenAI governance
  block:
    - name: Create audit log directory
      ansible.builtin.file:
        path: "{{ gov_audit_log_path }}"
        state: directory
        mode: "0750"
      when: gov_audit_log_enabled
      delegate_to: localhost

    - name: Check current API usage
      openai.openai.usage_info:
        start_date: "{{ '%Y-%m-%d' | strftime(ansible_date_time.epoch | int - (gov_usage_period_days * 86400)) }}"
        end_date: "{{ ansible_date_time.date }}"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
      register: _usage
      when: gov_usage_check_enabled

    - name: Alert on high usage
      ansible.builtin.debug:
        msg: >-
          WARNING: API usage for the last {{ gov_usage_period_days }} days is
          ${{ _usage.total_cost | default(0) | round(2) }},
          which exceeds the threshold of ${{ gov_usage_alert_threshold_usd }}
      when:
        - gov_usage_check_enabled
        - (_usage.total_cost | default(0) | float) > gov_usage_alert_threshold_usd

    - name: Configure projects with rate limits
      openai.openai.project:
        name: "{{ item.name }}"
        rate_limit:
          tokens_per_minute: "{{ item.rate_limit_tokens_per_minute | default(omit) }}"
          requests_per_minute: "{{ item.rate_limit_requests_per_minute | default(omit) }}"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
        state: "{{ gov_state }}"
      loop: "{{ gov_projects }}"
      loop_control:
        label: "{{ item.name }}"
      when: gov_projects | length > 0

    - name: Create new API key
      openai.openai.api_key:
        name: "{{ gov_key_name_prefix }}-{{ ansible_date_time.date }}"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
        state: present
      register: _new_key
      when: gov_rotate_keys
      no_log: true

    - name: List existing API keys
      openai.openai.api_key_info:
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
      register: _existing_keys
      when: gov_rotate_keys

    - name: Deactivate old API keys
      openai.openai.api_key:
        key_id: "{{ item.id }}"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
        state: absent
      loop: >-
        {{ _existing_keys.keys | default([]) |
           selectattr('name', 'match', '^' + gov_key_name_prefix) |
           selectattr('created', 'lt',
             (ansible_date_time.epoch | int - gov_key_max_age_days * 86400) | string) |
           list }}
      loop_control:
        label: "{{ item.name }}"
      when:
        - gov_rotate_keys
        - gov_deactivate_old_keys
      no_log: true

    - name: Log governance audit entry
      ansible.builtin.copy:
        content: |
          ---
          timestamp: "{{ ansible_date_time.iso8601 }}"
          action: "governance_check"
          usage_cost: {{ _usage.total_cost | default(0) }}
          keys_rotated: {{ gov_rotate_keys }}
          projects_configured: {{ gov_projects | length }}
        dest: "{{ gov_audit_log_path }}/audit-{{ ansible_date_time.date }}.yml"
        mode: "0640"
      when: gov_audit_log_enabled
      delegate_to: localhost

  rescue:
    - name: Report governance failure
      ansible.builtin.fail:
        msg: >-
          OpenAI governance configuration failed.
          Error: {{ ansible_failed_result.msg | default('Unknown error') }}
