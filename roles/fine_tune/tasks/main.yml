---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - ft_training_file is defined and ft_training_file | length > 0
      - ft_model is defined and ft_model | length > 0
      - openai_api_key is defined and openai_api_key | length > 0
    fail_msg: "Required variables: ft_training_file, ft_model, and OPENAI_API_KEY"

- name: Execute fine-tuning pipeline
  block:
    - name: Validate training file exists
      ansible.builtin.stat:
        path: "{{ ft_training_file }}"
      register: _training_file
      delegate_to: localhost

    - name: Assert training file exists
      ansible.builtin.assert:
        that:
          - _training_file.stat.exists
        fail_msg: "Training file not found: {{ ft_training_file }}"

    - name: Count training examples
      ansible.builtin.command:
        cmd: "wc -l {{ ft_training_file }}"
      register: _line_count
      changed_when: false
      delegate_to: localhost
      when: ft_validate_data

    - name: Validate training data size
      ansible.builtin.assert:
        that:
          - (_line_count.stdout.split()[0] | int) >= ft_min_training_examples
          - (_line_count.stdout.split()[0] | int) <= ft_max_training_examples
        fail_msg: >-
          Training data has {{ _line_count.stdout.split()[0] }} examples.
          Required: {{ ft_min_training_examples }}-{{ ft_max_training_examples }}
      when: ft_validate_data

    - name: Upload training file
      openai.openai.file:
        path: "{{ ft_training_file }}"
        purpose: "fine-tune"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
        state: present
      register: _training_upload

    - name: Upload validation file
      openai.openai.file:
        path: "{{ ft_validation_file }}"
        purpose: "fine-tune"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
        state: present
      register: _validation_upload
      when: ft_validation_file | length > 0

    - name: Create fine-tuning job
      openai.openai.fine_tuning_job:
        model: "{{ ft_model }}"
        training_file: "{{ _training_upload.file.id }}"
        validation_file: "{{ _validation_upload.file.id | default(omit) }}"
        suffix: "{{ ft_suffix | default(omit) }}"
        hyperparameters:
          n_epochs: "{{ ft_n_epochs }}"
          batch_size: "{{ ft_batch_size }}"
          learning_rate_multiplier: "{{ ft_learning_rate_multiplier }}"
        seed: "{{ ft_seed }}"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
        state: present
      register: _ft_job

    - name: Monitor fine-tuning progress
      openai.openai.fine_tuning_job_info:
        job_id: "{{ _ft_job.job.id }}"
        api_key: "{{ openai_api_key }}"
        organization: "{{ openai_organization | default(omit) }}"
      register: _ft_status
      until: _ft_status.job.status in ['succeeded', 'failed', 'cancelled']
      retries: "{{ (ft_wait_timeout / ft_poll_interval) | int }}"
      delay: "{{ ft_poll_interval }}"
      when: ft_wait_for_completion

    - name: Validate fine-tuning succeeded
      ansible.builtin.assert:
        that:
          - _ft_status.job.status == 'succeeded'
        fail_msg: "Fine-tuning job {{ _ft_job.job.id }} ended with status: {{ _ft_status.job.status }}"
      when: ft_wait_for_completion

    - name: Display fine-tuned model
      ansible.builtin.debug:
        msg: >-
          Fine-tuning complete.
          Job ID: {{ _ft_job.job.id }}
          Model: {{ _ft_status.job.fine_tuned_model | default('Pending') }}
          Status: {{ _ft_status.job.status | default('In progress') }}
      when: ft_wait_for_completion

  rescue:
    - name: Report fine-tuning failure
      ansible.builtin.fail:
        msg: >-
          Fine-tuning pipeline failed.
          Error: {{ ansible_failed_result.msg | default('Unknown error') }}
